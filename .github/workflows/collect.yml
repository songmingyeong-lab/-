name: Collect public data

on:
  workflow_dispatch:
    inputs:
      cycle:
        description: Collection cycle
        required: true
        default: daily
        type: choice
        options: [daily, monthly, quarterly]
  schedule:
    - cron: "20 18 * * *"

jobs:
  collect:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SCHEDULED_COLLECTION == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - name: Collect
        env:
          DATA_MODE: live
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEOUL_OPEN_API_KEY: ${{ secrets.SEOUL_OPEN_API_KEY }}
          SAVE_RAW_RESPONSES: "false"
        run: npm run collect -- --cycle "${{ inputs.cycle || 'daily' }}"
